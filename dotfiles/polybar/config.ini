include-file = ~/.config/theme/active/colors.ini

[bar/main]
width            = 100%
height           = 28
background       = ${colors.bg}
foreground       = ${colors.fg}
line-size        = 2
padding-left     = 1
padding-right    = 1
module-margin    = 1
font-0           = "DejaVu Sans Mono:size=9;2"
font-1           = "Hack Nerd Font:size=11;3"
modules-left     = launcher i3
modules-right    = volume battery tray date theme powermenu
wm-restack       = i3

[module/i3]
type                = internal/i3
format              = <label-state> <label-mode>
index-sort          = true
wrapping-scroll     = false
pin-workspaces      = true

label-focused            = %index%
label-focused-foreground = ${colors.yellow}
label-focused-background = ${colors.bg-hl}
label-focused-underline  = ${colors.yellow}
label-focused-padding    = 2

label-unfocused            = %index%
label-unfocused-foreground = ${colors.fg-dim}
label-unfocused-padding    = 2

label-urgent            = %index%
label-urgent-foreground = ${colors.fg}
label-urgent-background = ${colors.red}
label-urgent-padding    = 2

label-visible            = %index%
label-visible-foreground = ${colors.fg-dim}
label-visible-padding    = 2

[module/volume]
type         = custom/script
exec         = ~/.config/polybar/volume-status.sh
interval     = 1
click-left   = ~/.config/polybar/volume.sh &
label        = %output%

[module/tray]
type             = internal/tray
tray-spacing     = 4px
tray-background  = ${colors.bg}

[module/battery]
type              = internal/battery
battery           = BAT0
adapter           = AC
full-at           = 98
format-charging   = BAT <label-charging>
format-discharging = BAT <label-discharging>
label-charging    = %percentage%%+
label-discharging = %percentage%%-
label-full        = full
format-charging-foreground   = ${colors.green}
format-discharging-foreground = ${colors.yellow}

[module/date]
type       = custom/script
exec       = date +"%H:%M  %d-%m-%Y"
interval   = 1
click-left = ~/.config/polybar/calendar.sh &

[module/theme]
type          = custom/script
exec          = ~/.config/polybar/theme-status.sh
interval      = 1
click-left    = ~/.config/theme/theme-toggle.sh &
label         = %output%

[module/powermenu]
type          = custom/text
content       = %{T2}%{T-}
content-foreground = ${colors.fg-dim}
content-padding    = 2
click-left    = ~/.config/polybar/powermenu.sh &

[module/launcher]
type               = custom/text
content            = %{T2}%{T-}
content-foreground = ${colors.fg-dim}
content-padding    = 2
click-left         = rofi -show drun &
